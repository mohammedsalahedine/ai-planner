<!DOCTYPE html>
<html lang="ar" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Planner — التقويم</title>
  <style>
:root {
  --bg: oklch(13% 0.015 250);
  --surface: oklch(17% 0.015 250);
  --surface-2: oklch(20% 0.015 250);
  --fg: oklch(92% 0.01 250);
  --fg-2: oklch(70% 0.015 250);
  --muted: oklch(50% 0.015 250);
  --border: oklch(25% 0.015 250);
  --accent: oklch(62% 0.18 255);
  --accent-dim: oklch(45% 0.12 255);
  --success: oklch(65% 0.15 155);
  --warn: oklch(75% 0.15 80);
  --danger: oklch(60% 0.18 25);
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --font-display: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
}

[data-theme="light"] {
  --bg: oklch(97% 0.005 250);
  --surface: oklch(100% 0 0);
  --surface-2: oklch(95% 0.005 250);
  --fg: oklch(15% 0.015 250);
  --fg-2: oklch(40% 0.015 250);
  --muted: oklch(55% 0.015 250);
  --border: oklch(88% 0.008 250);
  --accent: oklch(52% 0.18 255);
  --accent-dim: oklch(85% 0.08 255);
  --success: oklch(50% 0.15 155);
  --warn: oklch(60% 0.15 80);
  --danger: oklch(50% 0.18 25);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

h1, h2, h3, h4 { font-family: var(--font-display); letter-spacing: -0.02em; line-height: 1.2; font-weight: 600; }
h1 { font-size: clamp(1.75rem, 3vw, 2.25rem); }
h2 { font-size: clamp(1.25rem, 2.5vw, 1.5rem); }
h3 { font-size: 1.125rem; }

input, select, textarea, button {
  font-family: var(--font-body);
  font-size: 0.9rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--fg);
  padding: 0.6rem 0.8rem;
  outline: none;
  transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
}
button {
  cursor: pointer;
  font-weight: 500;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.55rem 1.1rem;
  border-radius: var(--radius-sm);
  font-weight: 500;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { opacity: 0.9; }
.btn-secondary {
  background: var(--surface-2);
  color: var(--fg);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--border); }
.btn-danger {
  background: transparent;
  color: var(--danger);
  border-color: var(--danger);
}
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  display: grid;
  place-items: center;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-2);
}
.btn-icon:hover { background: var(--surface-2); color: var(--fg); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.badge-high { background: oklch(60% 0.18 25 / 0.15); color: var(--danger); }
.badge-medium { background: oklch(75% 0.15 80 / 0.15); color: var(--warn); }
.badge-low { background: oklch(65% 0.15 155 / 0.15); color: var(--success); }

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s ease;
}

.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform 0.25s ease;
}
.sidebar-logo {
  padding: 1.25rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo svg { width: 28px; height: 28px; }
.sidebar-logo span { font-weight: 700; font-size: 1rem; letter-spacing: -0.02em; }
.sidebar-nav {
  flex: 1;
  padding: 0.75rem 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.55rem 1rem;
  color: var(--fg-2);
  font-size: 0.88rem;
  font-weight: 500;
  border-radius: 0;
  text-decoration: none;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}
.sidebar-nav a:hover { background: var(--surface-2); color: var(--fg); text-decoration: none; }
.sidebar-nav a.active {
  color: var(--accent);
  background: oklch(62% 0.18 255 / 0.08);
  border-left-color: var(--accent);
}
.sidebar-nav a svg { width: 18px; height: 18px; opacity: 0.7; }
.sidebar-footer {
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.sidebar-footer .avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 0.75rem;
  font-weight: 700;
}
.sidebar-footer .user-info { flex: 1; }
.sidebar-footer .user-name { font-size: 0.82rem; font-weight: 600; }
.sidebar-footer .user-email { font-size: 0.72rem; color: var(--muted); }

.main {
  margin-left: 240px;
  padding: 1.5rem 2rem;
  min-height: 100vh;
}
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.page-header h1 { font-size: 1.5rem; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem;
}
.stat-label {
  font-size: 0.75rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.35rem;
}
.stat-value {
  font-size: 1.75rem;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.stat-value.accent { color: var(--accent); }
.stat-value.success { color: var(--success); }

.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  text-align: left;
  padding: 0.7rem 1rem;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
td {
  padding: 0.7rem 1rem;
  font-size: 0.88rem;
  border-bottom: 1px solid var(--border);
}
tr:last-child td { border-bottom: none; }
tr:hover { background: var(--surface-2); }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  place-items: center;
  z-index: 200;
}
.modal-overlay.show { display: grid; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  width: min(90vw, 480px);
  max-height: 85vh;
  overflow-y: auto;
}
.modal h2 { margin-bottom: 1rem; }
.form-group {
  margin-bottom: 1rem;
}
.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--fg-2);
  margin-bottom: 0.3rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
  margin-top: 1.25rem;
}

.toast {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.7rem 1rem;
  font-size: 0.85rem;
  z-index: 300;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.25s ease;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }

.mobile-header {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 99;
  padding: 0 1rem;
  align-items: center;
  gap: 0.75rem;
}
.mobile-header button {
  background: none;
  border: none;
  color: var(--fg);
  font-size: 1.3rem;
  cursor: pointer;
}
.mobile-header .mobile-title {
  font-weight: 700;
  font-size: 1rem;
}

.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}
.chart-container h3 { margin-bottom: 1rem; }

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.calendar-header {
  background: var(--surface-2);
  padding: 0.5rem;
  text-align: center;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.calendar-day {
  background: var(--surface);
  min-height: 100px;
  padding: 0.5rem;
  vertical-align: top;
}
.calendar-day.today { background: oklch(62% 0.18 255 / 0.06); }
.calendar-day.other-month { opacity: 0.35; }
.calendar-day .day-num {
  font-size: 0.78rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
.calendar-event {
  font-size: 0.68rem;
  padding: 2px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: grab;
}
.calendar-event.cat-book { background: oklch(62% 0.18 255 / 0.15); color: var(--accent); }
.calendar-event.cat-course { background: oklch(65% 0.15 155 / 0.15); color: var(--success); }
.calendar-event.cat-movie { background: oklch(75% 0.15 80 / 0.15); color: var(--warn); }
.calendar-event.cat-project { background: oklch(60% 0.18 25 / 0.15); color: var(--danger); }
.calendar-event.cat-training { background: oklch(55% 0.15 300 / 0.15); color: oklch(70% 0.15 300); }
.calendar-event.cat-custom { background: var(--surface-2); color: var(--fg-2); }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}
.empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 1rem; }
.empty-state p { font-size: 0.9rem; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.25s ease forwards; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow); }
  .mobile-header { display: flex; }
  .main { margin-left: 0; padding: 72px 1rem 1.5rem; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .calendar-day { min-height: 60px; }
  .page-header { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr; }
  .stat-value { font-size: 1.3rem; }
}

  </style>
</head>
<body>
  <div id="app"></div>
  <script>
const API = '';
let currentUser = null;

function getToken() { return localStorage.getItem('token'); }
function setToken(t) { localStorage.setItem('token', t); }
function clearToken() { localStorage.removeItem('token'); }

function getTheme() { return localStorage.getItem('theme') || 'dark'; }
function setTheme(t) {
  localStorage.setItem('theme', t);
  document.documentElement.setAttribute('data-theme', t);
}

async function apiFetch(path, opts = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { clearToken(); location.href = '/'; return; }
  return res.json();
}

function toast(msg, type = 'success') {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric' });
}

const categories = {
  book: { label: 'كتاب', icon: '📖' },
  course: { label: 'دورة', icon: '🎓' },
  movie: { label: 'فيلم', icon: '🎬' },
  project: { label: 'مشروع', icon: '📁' },
  training: { label: 'تدريب', icon: '🏋️' },
  custom: { label: 'مهمة مخصصة', icon: '📋' }
};

const priorities = {
  high: { label: 'عالية', class: 'badge-high' },
  medium: { label: 'متوسطة', class: 'badge-medium' },
  low: { label: 'منخفضة', class: 'badge-low' }
};

function checkAuth() {
  if (!getToken()) { location.href = '/'; return false; }
  return true;
}

function initTheme() {
  const t = getTheme();
  document.documentElement.setAttribute('data-theme', t);
}

function toggleTheme() {
  const t = getTheme() === 'dark' ? 'light' : 'dark';
  setTheme(t);
  const btn = document.querySelector('.theme-toggle');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
}

function logout() {
  clearToken();
  location.href = '/';
}

function sidebarHTML(activePage) {
  return `
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="6" stroke="currentColor" stroke-width="2"/><path d="M8 14l4 4 8-8" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>AI Planner</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard" class="${activePage === 'dashboard' ? 'active' : ''}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          لوحة التحكم
        </a>
        <a href="/tasks" class="${activePage === 'tasks' ? 'active' : ''}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          المهام
        </a>
        <a href="/calendar" class="${activePage === 'calendar' ? 'active' : ''}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          التقويم
        </a>
        <a href="/charts" class="${activePage === 'charts' ? 'active' : ''}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
          الرسوم البيانية
        </a>
        <a href="/settings" class="${activePage === 'settings' ? 'active' : ''}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          الإعدادات
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="userName">—</div>
          <div class="user-email" id="userEmail">—</div>
        </div>
        <button class="btn-icon theme-toggle" onclick="toggleTheme()" title="تبديل المظهر">☀️</button>
        <button class="btn-icon" onclick="logout()" title="تسجيل خروج">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
  `;
}

function mobileHeaderHTML(title) {
  return `
    <div class="mobile-header">
      <button onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <span class="mobile-title">${title}</span>
    </div>
  `;
}

async function loadUserInfo() {
  try {
    const user = await apiFetch('/api/auth/me');
    if (user && user.name) {
      currentUser = user;
      const nameEl = document.getElementById('userName');
      const emailEl = document.getElementById('userEmail');
      const avatarEl = document.getElementById('userAvatar');
      if (nameEl) nameEl.textContent = user.name;
      if (emailEl) emailEl.textContent = user.email;
      if (avatarEl) avatarEl.textContent = user.name.charAt(0).toUpperCase();
    }
  } catch {}
}

  </script>
  <script>
    initTheme();
    if (!checkAuth()) throw new Error('Not authed');

    let currentDate = new Date();
    let currentView = 'month';
    let scheduleData = [];

    document.getElementById('app').innerHTML = `
      ${mobileHeaderHTML('التقويم')}
      ${sidebarHTML('calendar')}
      <div class="main">
        <div class="page-header">
          <h1>التقويم</h1>
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <button class="btn-icon" onclick="changeMonth(-1)" title="الشهر السابق">‹</button>
            <span id="calendarTitle" style="font-weight:600;min-width:160px;text-align:center;font-size:0.95rem;"></span>
            <button class="btn-icon" onclick="changeMonth(1)" title="الشهر التالي">›</button>
            <div style="width:1px;height:20px;background:var(--border);margin:0 0.25rem;"></div>
            <button class="btn btn-sm ${currentView === 'month' ? 'btn-primary' : 'btn-secondary'}" onclick="setView('month')">شهري</button>
            <button class="btn btn-sm ${currentView === 'week' ? 'btn-primary' : 'btn-secondary'}" onclick="setView('week')">أسبوعي</button>
          </div>
        </div>
        <div id="calendarContainer"></div>
      </div>
    `;

    loadUserInfo();

    function setView(v) {
      currentView = v;
      document.querySelectorAll('.page-header .btn-sm').forEach(b => {
        b.className = `btn btn-sm ${b.textContent.trim() === (v === 'month' ? 'شهري' : 'أسبوعي') ? 'btn-primary' : 'btn-secondary'}`;
      });
      renderCalendar();
    }

    function changeMonth(delta) {
      if (currentView === 'month') {
        currentDate.setMonth(currentDate.getMonth() + delta);
      } else {
        currentDate.setDate(currentDate.getDate() + (delta * 7));
      }
      loadSchedule();
    }

    async function loadSchedule() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      if (currentView === 'month') {
        scheduleData = await apiFetch(`/api/schedule/month?year=${year}&month=${month}`);
      } else {
        scheduleData = await apiFetch('/api/schedule/week');
      }
      renderCalendar();
    }

    function renderCalendar() {
      const title = document.getElementById('calendarTitle');
      const container = document.getElementById('calendarContainer');

      if (currentView === 'month') {
        title.textContent = currentDate.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long' });
        renderMonthView(container);
      } else {
        const startOfWeek = new Date(currentDate);
        startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        title.textContent = `${startOfWeek.toLocaleDateString('ar-SA', { day: 'numeric', month: 'short' })} — ${endOfWeek.toLocaleDateString('ar-SA', { day: 'numeric', month: 'short', year: 'numeric' })}`;
        renderWeekView(container);
      }
    }

    function renderMonthView(container) {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startOffset = firstDay.getDay();
      const today = new Date();

      const dayNames = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
      let html = '<div class="calendar-grid">';
      dayNames.forEach(d => { html += `<div class="calendar-header">${d}</div>`; });

      const prevMonth = new Date(year, month, 0);
      for (let i = startOffset - 1; i >= 0; i--) {
        const day = prevMonth.getDate() - i;
        html += `<div class="calendar-day other-month"><div class="day-num">${day}</div></div>`;
      }

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
        const dayEvents = scheduleData.filter(s => s.date === dateStr);

        html += `<div class="calendar-day ${isToday ? 'today' : ''}" data-date="${dateStr}">
          <div class="day-num">${d}</div>
          ${dayEvents.slice(0, 3).map(e => `
            <div class="calendar-event cat-${e.category}" title="${e.task_name} ${e.start_time}-${e.end_time}" draggable="true" data-id="${e.id}" data-date="${dateStr}">
              ${e.start_time} ${e.task_name}
            </div>
          `).join('')}
          ${dayEvents.length > 3 ? `<div style="font-size:0.65rem;color:var(--muted);padding:2px 5px;">+${dayEvents.length - 3} أخرى</div>` : ''}
        </div>`;
      }

      const totalCells = startOffset + lastDay.getDate();
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let i = 1; i <= remaining; i++) {
        html += `<div class="calendar-day other-month"><div class="day-num">${i}</div></div>`;
      }

      html += '</div>';
      container.innerHTML = html;
      initDragDrop();
    }

    function renderWeekView(container) {
      const startOfWeek = new Date(currentDate);
      startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
      const today = new Date();
      const hours = [];
      for (let h = 6; h <= 22; h++) hours.push(`${String(h).padStart(2, '0')}:00`);

      let html = '<div style="display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">';
      html += '<div class="calendar-header" style="background:var(--surface-2);"></div>';
      for (let i = 0; i < 7; i++) {
        const d = new Date(startOfWeek);
        d.setDate(startOfWeek.getDate() + i);
        const isToday = d.toDateString() === today.toDateString();
        html += `<div class="calendar-header" style="${isToday ? 'color:var(--accent);' : ''}">${dayNameShort(d)} ${d.getDate()}</div>`;
      }

      hours.forEach(hour => {
        html += `<div style="padding:0.4rem;font-size:0.72rem;font-family:var(--font-mono);color:var(--muted);border-bottom:1px solid var(--border);text-align:center;">${hour}</div>`;
        for (let i = 0; i < 7; i++) {
          const d = new Date(startOfWeek);
          d.setDate(startOfWeek.getDate() + i);
          const dateStr = d.toISOString().split('T')[0];
          const h = parseInt(hour.split(':')[0]);
          const events = scheduleData.filter(s => {
            if (s.date !== dateStr) return false;
            const sh = parseInt(s.start_time.split(':')[0]);
            return sh === h;
          });
          html += `<div style="border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:2px;min-height:40px;">`;
          events.forEach(e => {
            html += `<div class="calendar-event cat-${e.category}" style="font-size:0.65rem;" title="${e.task_name} ${e.start_time}-${e.end_time}">${e.task_name}</div>`;
          });
          html += '</div>';
        }
      });

      html += '</div>';
      container.innerHTML = html;
    }

    function dayNameShort(d) {
      return d.toLocaleDateString('ar-SA', { weekday: 'short' });
    }

    function initDragDrop() {
      document.querySelectorAll('.calendar-event[draggable]').forEach(el => {
        el.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', el.dataset.id);
        });
      });
      document.querySelectorAll('.calendar-day[data-date]').forEach(el => {
        el.addEventListener('dragover', e => { e.preventDefault(); el.style.background = 'var(--surface-2)'; });
        el.addEventListener('dragleave', () => { el.style.background = ''; });
        el.addEventListener('drop', async e => {
          e.preventDefault();
          el.style.background = '';
          const taskId = e.dataTransfer.getData('text/plain');
          const newDate = el.dataset.date;
          if (taskId && newDate) {
            toast('تم نقل المهمة إلى ' + newDate);
          }
        });
      });
    }

    loadSchedule();
  </script>
</body>
</html>
